<!DOCTYPE html>
<html lang="fr">
<head>

  <!-- Métadonnées essentielles -->
  <meta charset="UTF-8" />
  <meta name="description" content="Site web de l'auto-entreprise Inspire Code : développement web et mobile">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Titre de la page, dynamique grâce à Flask -->
  <title>{% block title %}Inspire Code{% endblock %}</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <!-- 🔥 BOOTSTRAP (CSS) — MANQUAIT COMPLETEMENT -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- CSS Personnels -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/hero.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/devis.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/sections.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/about.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/utilities.css') }}">

  <!-- Favicon -->
  <link rel="icon" href="https://via.placeholder.com/32" type="image/png">

</head>
<body>
  <!-- Header -->
  <header>
    <nav class="navbar">
      <a href="{{ url_for('home') }}" class="logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Inspire Code Logo" class="logo-img"/>
        <span class="logo-text">Inspire Code</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="{{ url_for('about') }}">Nos valeurs</a></li>
      </ul>
      <div class="burger" id="burger">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </nav>
  </header>

  <!-- Contenu -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>© 2024 Inspire Code - Tous droits réservés.</p>
    </div>
  </footer>

  <!-- BOOTSTRAP JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS personnalisé -->
  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
